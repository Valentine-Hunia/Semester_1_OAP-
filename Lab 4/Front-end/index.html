<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>ЛР1 - Варіант 7 (Рівень: Добре)</title>
    <link rel="stylesheet" href="styles.css">
<script type="module" src="./dist/js/main.js?v=1" defer></script>

</head>
<body>
    <div class="container">
        <header>
            <h1>Система реєстрації на події (Варіант №7)</h1>
        </header>

        <main>
            <section id="form-section">
                <h2>Додати нову подію</h2>
                <form id="eventForm">
                    <div class="field">
                        <label for="titleInput">Назва події:</label>
                        <input type="text" id="titleInput" name="title" placeholder="Введіть назву події">
                        <p class="error-text" id="titleError"></p>
                    </div>

                    <div class="field">
                        <label for="dateInput">Дата:</label>
                        <input type="date" id="dateInput" name="date">
                        <p class="error-text" id="dateError"></p>
                    </div>

                    <div class="field">
                        <label for="locationInput">Локація:</label>
                        <input type="text" id="locationInput" name="location" placeholder="Введіть локацію проведення події">
                        <p class="error-text" id="locationError"></p>
                    </div>

                    <div class="field">
                        <label for="capacityInput">Місткість (осіб):</label>
                        <input type="number" id="capacityInput" name="capacity" placeholder="Введіть кількість учасників">
                        <p class="error-text" id="capacityError"></p>
                    </div>
                </form>
            <section>

    <div class="buttons">
        <button type="submit">Додати подію</button>
        <button type="reset" id="resetBtn">Очистити форму</button>
                    </div>
                </form>
            </section>

            <section id="list-section">
                <h2>Список подій</h2>
                <table id="eventsTable">
                    <thead>
                        <tr>
                            <th>Назва</th>
                            <th>Дата</th>
                            <th>Локація</th>
                            <th>Місткість</th>
                            <th>Дії</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </section>
        </main>
    </div>
</body>
</html>
